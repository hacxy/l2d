<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>l2d demo</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./style-console.css" />
    <link rel="stylesheet" href="./style-models.css" />
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <nav id="sidebar">
      <h2>Demos</h2>
      <ul id="demo-list"></ul>
    </nav>
    <div id="main">
      <div id="stage-header">
        <div class="running-label">Running: <span id="demo-title">—</span></div>
        <button id="reload-btn">重新运行</button>
      </div>
      <div id="stage"></div>
      <div id="console-panel">
        <div class="console-header">
          <span>Console</span>
          <button id="console-clear">清空</button>
        </div>
        <div id="console-log"></div>
      </div>
    </div>
    <aside id="model-panel">
      <h2>Models</h2>
      <ul id="model-list">
        <li class="status">Loading...</li>
      </ul>
    </aside>
    <div id="copy-toast">Copied!</div>
  </body>
</html>
