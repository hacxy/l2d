<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>l2d demo</title>
    <link rel="stylesheet" href="./styles/layout.css" />
    <link rel="stylesheet" href="./styles/loading.css" />
    <link rel="stylesheet" href="./styles/code.css" />
    <link rel="stylesheet" href="./styles/console.css" />
    <link rel="stylesheet" href="./styles/models.css" />
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <nav id="sidebar">
      <h2>Demos</h2>
      <ul id="demo-list"></ul>
    </nav>
    <div id="main">
      <div id="stage-header">
        <div class="running-label">Running: <span id="demo-title">—</span></div>
        <button id="reload-btn">重新运行</button>
        <div class="header-links">
          <a href="https://l2d.hacxy.cn" target="_blank" class="header-doc-btn">查阅文档</a>
          <a href="https://github.com/hacxy/l2d" target="_blank" class="header-icon-btn" title="GitHub">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"
              />
            </svg>
          </a>
        </div>
      </div>
      <div id="stage"></div>
      <div id="console-panel">
        <div class="console-header">
          <span>Console</span>
          <button id="console-toggle">折叠</button>
          <button id="console-clear">清空</button>
        </div>
        <div id="console-log"></div>
      </div>
      <div id="code-panel" class="collapsed">
        <div class="code-header">
          <span>Setup</span>
          <span id="code-file" class="code-file"></span>
          <button id="code-toggle">展开</button>
        </div>
        <div id="code-view"><pre></pre></div>
      </div>
    </div>
    <aside id="model-panel">
      <h2>Models</h2>
      <ul id="model-list">
        <li class="status">Loading...</li>
      </ul>
    </aside>
    <div id="copy-toast">Copied!</div>
  </body>
</html>
